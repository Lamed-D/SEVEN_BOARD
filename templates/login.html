<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN_BOARD - 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        .glass-login {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-[#06080E] text-gray-100 font-sans min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- 배경 장식 글로우 원형 -->
    <div class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full bg-emerald-500/10 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-[450px] h-[450px] rounded-full bg-teal-500/10 blur-[150px] pointer-events-none"></div>

    <!-- 로그인 박스 컨테이너 -->
    <div class="w-full max-w-md px-6 z-10">
        <div class="glass-login rounded-3xl p-8 shadow-2xl relative">
            
            <!-- 상단 로고 & 타이틀 -->
            <div class="text-center mb-8">
                <div class="inline-flex h-14 w-14 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-2xl items-center justify-center text-[#06080E] font-black text-2xl font-outfit shadow-lg shadow-emerald-500/20 mb-4">
                    7
                </div>
                <h1 class="text-2xl font-bold font-outfit tracking-wide bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent">
                    SEVEN_BOARD
                </h1>
                <p class="text-xs text-gray-400 mt-1">사내 포털 및 통합 메신저 서비스</p>
            </div>

            <!-- 에러 메시지 팝업 -->
            {% if error %}
            <div class="mb-5 bg-red-500/10 border border-red-500/20 text-red-400 text-xs px-4 py-3 rounded-xl flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation text-sm shrink-0"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- 로그인 폼 -->
            <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2" for="login_input">
                        사원번호 또는 이메일
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input class="w-full bg-[#0a0e1a]/80 border border-gray-800 focus:border-emerald-500/50 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-100 placeholder-gray-500 outline-none transition-colors"
                               type="text" 
                               id="login_input" 
                               name="login_input" 
                               placeholder="예: minseo@seven.com 또는 EMP001" 
                               required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2" for="password">
                        비밀번호
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input class="w-full bg-[#0a0e1a]/80 border border-gray-800 focus:border-emerald-500/50 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-100 placeholder-gray-500 outline-none transition-colors"
                               type="password" 
                               id="password" 
                               name="password" 
                               placeholder="비밀번호를 입력하세요" 
                               required>
                    </div>
                </div>

                <button class="w-full mt-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-darkBg font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-emerald-500/10 hover:shadow-emerald-500/20 active:scale-[0.98] transition-all text-sm flex items-center justify-center gap-2 cursor-pointer"
                        type="submit">
                    <span>로그인하기</span>
                    <i class="fa-solid fa-right-to-bracket text-xs"></i>
                </button>
            </form>

            <!-- 평가용 샘플 사원 정보 안내 아코디언/카드 -->
            <div class="mt-8 pt-6 border-t border-gray-800/60">
                <p class="text-[10px] font-bold text-emerald-400/80 uppercase tracking-wider mb-3 text-center">
                    <i class="fa-solid fa-circle-info mr-1"></i> 테스트 계정 정보
                </p>
                <div class="grid grid-cols-2 gap-2 text-[10px] text-gray-400">
                    <div class="bg-gray-800/30 border border-gray-800 p-2.5 rounded-xl">
                        <p class="font-bold text-gray-200">봉민서 (팀장/기획)</p>
                        <p class="mt-0.5 font-mono">EMP001</p>
                        <p class="text-[9px] text-gray-500">Pass: 1234</p>
                    </div>
                    <div class="bg-gray-800/30 border border-gray-800 p-2.5 rounded-xl">
                        <p class="font-bold text-gray-200">박은찬 (연구원/개발)</p>
                        <p class="mt-0.5 font-mono">EMP002</p>
                        <p class="text-[9px] text-gray-500">Pass: 1234</p>
                    </div>
                    <div class="bg-gray-800/30 border border-gray-800 p-2.5 rounded-xl">
                        <p class="font-bold text-gray-200">박정우 (연구원/개발)</p>
                        <p class="mt-0.5 font-mono">EMP003</p>
                        <p class="text-[9px] text-gray-500">Pass: 1234</p>
                    </div>
                    <div class="bg-gray-800/30 border border-gray-800 p-2.5 rounded-xl">
                        <p class="font-bold text-gray-200">송건창 (대리/홍보)</p>
                        <p class="mt-0.5 font-mono">EMP004</p>
                        <p class="text-[9px] text-gray-500">Pass: 1234</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
