{% extends 'layout.html' %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6 animate-fade-in">
    
    <!-- 1. 이전 가기 -->
    <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-xs text-gray-400 hover:text-emerald-400 transition-colors">
        <i class="fa-solid fa-arrow-left"></i>
        <span>이전 화면으로 돌아가기</span>
    </a>

    <!-- 2. 쓰기/수정 폼 카드 -->
    <div class="glass-panel rounded-2xl p-8 border border-gray-800/80 shadow-2xl space-y-6">
        <div>
            <h2 class="text-xl font-bold font-outfit text-gray-100 flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square text-emerald-400"></i> 
                {% if post %} 게시글 수정하기 {% else %} 새로운 사내 소통글 작성 {% endif %}
            </h2>
            <p class="text-xs text-gray-500 mt-1">
                사내 임직원들과 유용한 기획, 이슈, 자유로운 이야기를 교환해 보세요.
            </p>
        </div>

        <form action="{% if post %}{{ url_for('board_edit', post_id=post.id) }}{% else %}{{ url_for('board_write') }}{% endif %}" method="POST" class="space-y-6">
            
            <!-- 카테고리 & 권한 제어 -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">게시글 분류</label>
                <div class="relative w-48">
                    <select name="category" required class="w-full bg-[#0a0e1a]/80 border border-gray-800 focus:border-emerald-500/30 rounded-xl py-2.5 px-4 text-xs text-gray-200 outline-none transition-colors appearance-none cursor-pointer">
                        {% if g.user.is_admin %}
                        <option value="Notice" {% if post and post.category == 'Notice' %} selected {% endif %}>📢 사내공지사항</option>
                        {% endif %}
                        <option value="Free" {% if post and post.category == 'Free' %} selected {% endif %}>💬 자유게시판</option>
                        <option value="Dept_Dev" {% if post and post.category == 'Dept_Dev' %} selected {% endif %}>💻 개발부서 소통</option>
                        <option value="Dept_HR" {% if post and post.category == 'Dept_HR' %} selected {% endif %}>👥 인사부서 소통</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 pointer-events-none text-xs">
                        <i class="fa-solid fa-chevron-down"></i>
                    </span>
                </div>
            </div>

            <!-- 제목 -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">게시글 제목</label>
                <input type="text" name="title" value="{% if post %}{{ post.title }}{% endif %}" placeholder="게시글 제목을 작성하세요..." required class="w-full bg-[#0a0e1a]/80 border border-gray-800 focus:border-emerald-500/30 rounded-xl py-3 px-4 text-sm text-gray-100 placeholder-gray-500 outline-none transition-colors">
            </div>

            <!-- 본문 내용 -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">본문 내용</label>
                <textarea name="content" rows="10" placeholder="본문 내용을 입력하세요... 마크다운 문법 적용이 가능합니다." required class="w-full bg-[#0a0e1a]/80 border border-gray-800 focus:border-emerald-500/30 rounded-xl py-3.5 px-4 text-sm text-gray-100 placeholder-gray-500 outline-none transition-colors resize-none leading-relaxed">{% if post %}{{ post.content }}{% endif %}</textarea>
            </div>

            <!-- 하단 확인 버튼 -->
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-darkBg font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-emerald-500/10 hover:shadow-emerald-500/20 active:scale-[0.98] transition-all text-xs cursor-pointer">
                {% if post %} 게시글 수정 반영하기 {% else %} 게시글 작성 완료 {% endif %}
            </button>
            
        </form>
    </div>

</div>
{% endblock %}
